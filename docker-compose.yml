services:

  # ── Databases ────────────────────────────────────────────────
  postgres-product:
    image: postgres:16
    container_name: postgres-product
    profiles: [services, all]
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - product-data:/var/lib/postgresql/data
    networks:
      - teaching-phase1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16
    container_name: postgres-order
    profiles: [services, all]
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - order-data:/var/lib/postgresql/data
    networks:
      - teaching-phase1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application Services ─────────────────────────────────────
  product-service:
    build:
      context: ./product-service
    container_name: product-service
    profiles: [services, all]
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres-product:
        condition: service_healthy
    networks:
      - teaching-phase1

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    profiles: [services, all]
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CLIENTS_PRODUCT_SERVICE_URL: http://product-service:8081
    depends_on:
      postgres-order:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - teaching-phase1

  # ── Infrastructure ───────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    profiles: [all]
    ports:
      - "8761:8761"
    networks:
      - teaching-phase1

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    profiles: [all]
    ports:
      - "8888:8888"
    networks:
      - teaching-phase1

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    profiles: [all]
    ports:
      - "8080:8080"
    networks:
      - teaching-phase1

volumes:
  product-data:
  order-data:

networks:
  teaching-phase1:
    driver: bridge
